<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>엑스포시민광장 현재 위치 안내</title>
    <style>
        body { margin: 0; padding: 0; background-color: #1a1a1a; display: flex; justify-content: center; }
        .map-container { position: relative; width: 100%; max-width: 800px; overflow: hidden; }
        .map-image { width: 100%; display: block; }
        #my-location {
            position: absolute; width: 28px; height: 28px; 
            background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" fill="%23ff3b30" stroke="white" stroke-width="1.5"/></svg>'); 
            background-repeat: no-repeat;
            transform: translate(-50%, -100%); 
            filter: drop-shadow(0 2px 3px rgba(0,0,0,0.5));
            display: none; z-index: 10;
        }
    </style>
</head>
<body>
<div class="map-container">
    <img src="map.jpg" class="map-image" alt="시민광장 조감도">
    <div id="my-location"></div>
</div>
<script>
(function() {
    const corners = {
        nw: { lat: 36.371818, lng: 127.382459 },
        ne: { lat: 36.371818, lng: 127.393943 },
        se: { lat: 36.364615, lng: 127.393943 },
        sw: { lat: 36.364615, lng: 127.382459 }
    };
    const marker = document.getElementById('my-location');

    function calculatePosition(currentLat, currentLng) {
        const minLng = Math.min(corners.nw.lng, corners.sw.lng);
        const maxLng = Math.max(corners.ne.lng, corners.se.lng);
        const minLat = Math.min(corners.se.lat, corners.sw.lat);
        const maxLat = Math.max(corners.nw.lat, corners.ne.lat);

        if(currentLng < minLng || currentLng > maxLng || currentLat < minLat || currentLat > maxLat) return null; 

        const xRatio = (currentLng - minLng) / (maxLng - minLng);
        const yRatio = (maxLat - currentLat) / (maxLat - minLat);

        const topX = (1 - xRatio) * 0 + xRatio * 100;
        const bottomX = (1 - xRatio) * 0 + xRatio * 100; 
        const finalX = (1 - yRatio) * topX + yRatio * bottomX;
        const finalY = yRatio * 100;

        return { x: finalX, y: finalY };
    }

    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(
            function(position) {
                const mapPos = calculatePosition(position.coords.latitude, position.coords.longitude);
                if (mapPos) {
                    marker.style.left = mapPos.x + '%';
                    marker.style.top = mapPos.y + '%';
                    marker.style.display = 'block';
                } else {
                    marker.style.display = 'none'; 
                }
            },
            function(error) { console.log("위치 추적 실패: ", error); },
            { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
        );
    }
})();
</script>
</body>
</html>
