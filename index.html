<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>엑스포시민광장 안내도</title>
    <style>
        /* 기본 리셋 및 전체 화면 설정 */
        body { margin: 0; padding: 0; background-color: #000; overflow-x: hidden; }
        
        #map-wrapper { position: relative; width: 100%; display: block; overflow: hidden; }
        #map-img { width: 100%; display: block; -webkit-user-drag: none; }

        /* 📍 기준점이 되는 투명한 앵커 (정확한 좌표에 위치) */
        #user-pin {
            position: absolute;
            width: 0; height: 0;
            display: none; z-index: 500;
            transition: left 0.5s cubic-bezier(0.22, 1, 0.36, 1), top 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }

        /* 🎨 아름다운 그라데이션 물방울 핀 디자인 */
        .pin-body {
            position: absolute;
            bottom: 0px; /* 핀의 뾰족한 끝이 좌표에 정확히 맞닿도록 설정 */
            left: -15px; /* 가로 중앙 정렬 (너비 30px의 절반) */
            width: 30px; height: 42px;
            background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 24 36" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="%23ff512f"/><stop offset="100%" stop-color="%23dd2476"/></linearGradient><filter id="ds" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="%23000" flood-opacity="0.5"/></filter></defs><path d="M12 0C5.373 0 0 5.373 0 12c0 9 12 24 12 24s12-15 12-24C24 5.373 18.627 0 12 0z" fill="url(%23g)" filter="url(%23ds)"/><circle cx="12" cy="12" r="4.5" fill="%23ffffff"/></svg>');
            background-repeat: no-repeat;
            transform-origin: bottom center;
            animation: bounceIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* 🌊 핀 아래에서 퍼져나가는 물결 애니메이션 (실시간 위치 느낌 강조) */
        .pin-pulse {
            position: absolute;
            bottom: -4px; left: -12px; /* 앵커 기준 중앙 정렬 */
            width: 24px; height: 8px;
            background: rgba(221, 36, 118, 0.8);
            border-radius: 50%;
            z-index: -1;
            animation: pulsing 1.5s infinite ease-out;
        }

        /* 애니메이션 키프레임 */
        @keyframes pulsing {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(3.5); opacity: 0; }
        }
        @keyframes bounceIn {
            0% { transform: translateY(-20px) scale(0.8); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

<div id="map-wrapper">
    <img src="map.jpg" id="map-img" alt="엑스포시민광장 조감도">
    <div id="user-pin">
        <div class="pin-pulse"></div>
        <div class="pin-body"></div>
    </div>
</div>

<script>
(function() {
    const pin = document.getElementById('user-pin');

    let lastLat = null;
    let lastLng = null;

    // 📌 직접 측정한 4개의 기준점 데이터
    const pts = [
        { lat: 36.370976, lng: 127.382749, x: 3.27976,  y: 2.9653  }, // 교회
        { lat: 36.370474, lng: 127.393289, x: 95.1112,  y: 10.2056 }, // 수목원
        { lat: 36.364964, lng: 127.393495, x: 96.0057,  y: 94.704  }, // 평송
        { lat: 36.365037, lng: 127.382889, x: 4.4723,   y: 94.2783 }  // 5번게이트
    ];

    // 삼각형 매핑 (원근감/굴곡 왜곡 보정용)
    const triangles = [[0, 1, 3], [1, 2, 3]];

    function getWeights(p, a, b, c) {
        const det = (b.lat - c.lat) * (a.lng - c.lng) + (c.lng - b.lng) * (a.lat - c.lat);
        if(det === 0) return null;
        const w1 = ((b.lat - c.lat) * (p.lng - c.lng) + (c.lng - b.lng) * (p.lat - c.lat)) / det;
        const w2 = ((c.lat - a.lat) * (p.lng - c.lng) + (a.lng - c.lng) * (p.lat - c.lat)) / det;
        const w3 = 1 - w1 - w2;
        return {w1, w2, w3};
    }

    function calculateMapPosition(currentLat, currentLng) {
        const p = { lat: currentLat, lng: currentLng };
        let bestWeights = null;
        let bestTriangle = null;
        let maxMinWeight = -Infinity;

        for (let i = 0; i < triangles.length; i++) {
            const A = pts[triangles[i][0]];
            const B = pts[triangles[i][1]];
            const C = pts[triangles[i][2]];
            
            const w = getWeights(p, A, B, C);
            if(w === null) continue;

            const minWeight = Math.min(w.w1, w.w2, w.w3);
            if (minWeight >= -0.05) { 
                bestTriangle = triangles[i]; bestWeights = w; break;
            }
            if (minWeight > maxMinWeight) {
                maxMinWeight = minWeight; bestTriangle = triangles[i]; bestWeights = w;
            }
        }

        if (!bestTriangle) return null;

        const A = pts[bestTriangle[0]];
        const B = pts[bestTriangle[1]];
        const C = pts[bestTriangle[2]];

        //
