<script>
(function() {
    const corners = {
        nw: { lat: 36.371818, lng: 127.382459 },
        ne: { lat: 36.371818, lng: 127.393943 },
        se: { lat: 36.364615, lng: 127.393943 },
        sw: { lat: 36.364615, lng: 127.382459 }
    };
    const marker = document.getElementById('my-location');

    function calculatePosition(currentLat, currentLng) {
        const minLng = Math.min(corners.nw.lng, corners.sw.lng);
        const maxLng = Math.max(corners.ne.lng, corners.se.lng);
        const minLat = Math.min(corners.se.lat, corners.sw.lat);
        const maxLat = Math.max(corners.nw.lat, corners.ne.lat);

        if(currentLng < minLng || currentLng > maxLng || currentLat < minLat || currentLat > maxLat) return null; 

        const xRatio = (currentLng - minLng) / (maxLng - minLng);
        let yRatio = (maxLat - currentLat) / (maxLat - minLat);

        // 원근감 조절용 커브값 (평면 지도는 1.0)
        // 오차 데이터를 확인하신 후 이 값을 1.0부터 천천히 조절하시면 됩니다.
        const yCurve = 1.0; 
        yRatio = Math.pow(yRatio, yCurve);

        const finalX = xRatio * 100;
        const finalY = yRatio * 100;

        return { x: finalX, y: finalY };
    }

    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(
            function(position) {
                const mapPos = calculatePosition(position.coords.latitude, position.coords.longitude);
                if (mapPos) {
                    marker.style.left = mapPos.x + '%';
                    marker.style.top = mapPos.y + '%';
                    marker.style.display = 'block';
                } else {
                    marker.style.display = 'none'; 
                }
            },
            function(error) { console.log("위치 추적 실패: ", error); },
            { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
        );
    }

    // ▼▼▼ 화면 클릭 시 X, Y(%) 좌표를 알려주는 디버깅 도구 ▼▼▼
    document.querySelector('.map-image').addEventListener('click', function(e) {
        const rect = e.target.getBoundingClientRect();
        // 이미지 내부에서 클릭한 위치의 픽셀 좌표를 구한 뒤, 전체 너비/높이에 대한 백분율(%)로 변환
        const xPos = ((e.clientX - rect.left) / rect.width) * 100;
        const yPos = ((e.clientY - rect.top) / rect.height) * 100;
        
        // 화면에 알림창 띄우기
        alert(`📍 화면 클릭 좌표\nX: ${xPos.toFixed(2)}%\nY: ${yPos.toFixed(2)}%`);
    });

})();
</script>
