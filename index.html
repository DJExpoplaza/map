<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>좌표 수집 도구 (Calibration)</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #222; 
            display: flex; 
            flex-direction: column;
            align-items: center;
        }
        .map-container { 
            position: relative; 
            width: 100%; 
            max-width: 800px; 
        }
        .map-image { 
            width: 100%; 
            display: block; 
            cursor: crosshair; /* 마우스 포인터를 십자선으로 변경 */
        }
        /* 터치한 곳에 임시로 찍힐 파란색 점 */
        .click-dot {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #007bff;
            border: 2px solid white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            display: none;
            pointer-events: none; /* 점이 클릭을 방해하지 않도록 함 */
        }
        /* 좌표 결과를 보여줄 하단 박스 */
        .result-box {
            position: fixed;
            bottom: 20px;
            background-color: rgba(0, 0, 0, 0.8);
            color: #00ff00;
            padding: 15px 20px;
            border-radius: 8px;
            font-size: 18px;
            font-family: monospace;
            text-align: center;
            border: 1px solid #555;
            z-index: 100;
        }
    </style>
</head>
<body>

<div class="map-container">
    <img src="map.jpg" class="map-image" id="target-map" alt="조감도">
    <div id="dot" class="click-dot"></div>
</div>

<div class="result-box" id="result">
    이미지의 특정 지점을<br>터치해 주세요.
</div>

<script>
    const mapImg = document.getElementById('target-map');
    const resultBox = document.getElementById('result');
    const dot = document.getElementById('dot');

    mapImg.addEventListener('click', function(e) {
        // 이미지가 화면에서 차지하는 크기와 위치 정보 가져오기
        const rect = e.target.getBoundingClientRect();
        
        // 터치한 위치의 정확한 X, Y 픽셀 계산
        const xPos = e.clientX - rect.left;
        const yPos = e.clientY - rect.top;

        // 전체 이미지 크기 대비 퍼센트(%)로 변환
        const xPercent = (xPos / rect.width) * 100;
        const yPercent = (yPos / rect.height) * 100;

        // 화면 하단 박스에 좌표 텍스트 출력
        resultBox.innerHTML = `📍 좌표 확인<br>X: <span style="color:white">${xPercent.toFixed(2)}%</span><br>Y: <span style="color:white">${yPercent.toFixed(2)}%</span>`;

        // 터치한 곳에 파란색 점 표시하기
        dot.style.left = xPercent + '%';
        dot.style.top = yPercent + '%';
        dot.style.display = 'block';
    });
</script>

</body>
</html>
