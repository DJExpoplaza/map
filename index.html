<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>엑스포시민광장 GPS 실시간 매핑</title>
    <style>
        body { margin: 0; padding: 0; background-color: #111; color: #fff; font-family: 'Pretendard', sans-serif; overflow-x: hidden; }
        
        #map-wrapper { position: relative; width: 100%; display: inline-block; overflow: hidden; }
        #map-img { width: 100%; display: block; -webkit-user-drag: none; }

        /* 💧 물방울 모양 핀 디자인 */
        #user-pin {
            position: absolute; width: 28px; height: 28px;
            background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 24 36" xmlns="http://www.w3.org/2000/svg"><path d="M12 0C7.5 0 2 6 2 13c0 7.5 10 23 10 23s10-15.5 10-23C22 6 16.5 0 12 0z" fill="%23007bff" stroke="%23ffffff" stroke-width="2"/><circle cx="12" cy="12" r="4" fill="%23ffffff"/></svg>');
            background-repeat: no-repeat;
            /* 핀의 뾰족한 끝(하단 중앙)이 실제 좌표에 닿도록 설정 */
            transform: translate(-50%, -100%);
            display: none; z-index: 500;
            transition: left 0.3s ease, top 0.3s ease;
            filter: drop-shadow(0px 4px 5px rgba(0,0,0,0.6));
        }

        /* 🎛️ 오차 수동 조정 컨트롤 패널 */
        .control-panel {
            position: fixed; top: 10px; right: 10px; background: rgba(0, 0, 0, 0.85);
            padding: 15px; border: 1px solid #444; border-radius: 8px;
            font-size: 13px; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .control-panel h3 { margin: 0 0 10px 0; font-size: 15px; color: #ffeb3b; }
        .control-group { margin-bottom: 10px; }
        .control-group label { display: inline-block; width: 60px; color: #aaa; }
        .control-group input[type="number"] { width: 60px; padding: 4px; background: #222; color: #00ff00; border: 1px solid #555; text-align: center; }
        .info-text { margin-top: 10px; font-size: 11px; color: #888; border-top: 1px solid #333; padding-top: 10px; }
        #gps-status { color: #00ff00; font-weight: bold; }
    </style>
</head>
<body>

<div id="map-wrapper">
    <img src="map.jpg" id="map-img" alt="엑스포시민광장 조감도">
    <div id="user-pin"></div>
</div>

<div class="control-panel">
    <h3>🛠 미세 오차 조정기</h3>
    <div class="control-group">
        <label>X축 이동</label>
        <input type="number" id="offset-x" value="0.00" step="0.1"> %
    </div>
    <div class="control-group">
        <label>Y축 이동</label>
        <input type="number" id="offset-y" value="0.00" step="0.1"> %
    </div>
    <div class="info-text">
        현재 수신 GPS:<br><span id="gps-status">대기 중...</span>
    </div>
</div>

<script>
(function() {
    const pin = document.getElementById('user-pin');
    const inputOffsetX = document.getElementById('offset-x');
    const inputOffsetY = document.getElementById('offset-y');
    const gpsStatus = document.getElementById('gps-status');

    let lastLat = null;
    let lastLng = null;

    // 📌 직접 측정한 4개의 기준점 데이터
    const pts = [
        { name: "교회",       lat: 36.370976, lng: 127.382749, x: 3.27976,  y: 2.9653  }, // 0
        { name: "수목원",     lat: 36.370474, lng: 127.393289, x: 95.1112,  y: 10.2056 }, // 1 (위도 오타 수정됨)
        { name: "평송",       lat: 36.364964, lng: 127.393495, x: 96.0057,  y: 94.704  }, // 2
        { name: "5번게이트",  lat: 36.365037, lng: 127.382889, x: 4.4723,   y: 94.2783 }  // 3
    ];

    // 삼각형 2개로 분할하여 매핑 (원근감/굴곡 왜곡 최소화)
    const triangles = [[0, 1, 3], [1, 2, 3]];

    function getWeights(p, a, b, c) {
        const det = (b.lat - c.lat) * (a.lng - c.lng) + (c.lng - b.lng) * (a.lat - c.lat);
        if(det === 0) return null;
        const w1 = ((b.lat - c.lat) * (p.lng - c.lng) + (c.lng - b.lng) * (p.lat - c.lat)) / det;
        const w2 = ((c.lat - a.lat) * (p.lng - c.lng) + (a.lng - c.lng) * (p.lat - c.lat)) / det;
        const w3 = 1 - w1 - w2;
        return {w1, w2, w3};
    }

    // GPS 좌표를 지도 상의 픽셀 퍼센트(%)로 변환하는 함수
    function calculateMapPosition(currentLat, currentLng) {
        const p = { lat: currentLat, lng: currentLng };
        let bestWeights = null;
        let bestTriangle = null;
        let maxMinWeight = -Infinity;

        // 현재 위치가 어느 삼각형에 속하는지 파악
        for (let i = 0; i < triangles.length; i++) {
            const A = pts[triangles[i][0]];
            const B = pts[triangles[i][1]];
            const C = pts[triangles[i][2]];
            
            const w = getWeights(p, A, B, C);
            if(w === null) continue;

            const minWeight = Math.min(w.w1, w.w2, w.w3);
            if (minWeight >= -0.05) { 
                bestTriangle = triangles[i]; bestWeights = w; break;
            }
            if (minWeight > maxMinWeight) {
                maxMinWeight = minWeight; bestTriangle = triangles[i]; bestWeights = w;
            }
        }

        if (!bestTriangle) return null;

        const A = pts[bestTriangle[0]];
        const B = pts[bestTriangle[1]];
        const C = pts[bestTriangle[2]];

        // 🎯 수동 조정(Nudge) 오차값 적용
        const manualOffsetX = parseFloat(inputOffsetX.value) || 0;
        const manualOffsetY = parseFloat(inputOffsetY.value) || 0;

        // 원근 왜곡이 보정된 베이스 좌표에 수동 오차를 더함
        const finalX = (bestWeights.w1 * A.x + bestWeights.w2 * B.x + bestWeights.w3 * C.x) + manualOffsetX;
        const finalY = (bestWeights.w1 * A.y + bestWeights.w2 * B.y + bestWeights.w3 * C.y) + manualOffsetY;

        return { x: finalX, y: finalY };
    }

    // 핀 위치 업데이트 실행
    function updatePin() {
        if (!lastLat || !lastLng) return;
        const mapPos = calculateMapPosition(lastLat, lastLng);
        
        if (mapPos) {
            pin.style.left = mapPos.x + '%';
            pin.style.top = mapPos.y + '%';
            pin.style.display = 'block';
        }
    }

    // 사용자가 패널에서 숫자를 조절할 때마다 즉시 핀 위치를 다시 그림
    inputOffsetX.addEventListener('input', updatePin);
    inputOffsetY.addEventListener('input', updatePin);

    // 실시간 GPS 수신
    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(
            function(pos) {
                lastLat = pos.coords.latitude;
                lastLng = pos.coords.longitude;
                gpsStatus.innerText = `${lastLat.toFixed(5)}, ${lastLng.toFixed(5)}`;
                updatePin();
            },
            function(err) {
                gpsStatus.innerText = "GPS 권한 필요";
                gpsStatus.style.color = "red";
            },
            { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
        );
    } else {
        gpsStatus.innerText = "GPS 지원 안 됨";
    }
})();
</script>

</body>
</html>
