<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS 실시간 위치 지도</title>
    <style>
        body { margin: 0; padding: 0; background-color: #f0f0f0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .map-container { position: relative; display: inline-block; box-shadow: 0 4px 8px rgba(0,0,0,0.2); border-radius: 8px; overflow: hidden; max-width: 95%; }
        .map-image { display: block; max-width: 100%; height: auto; }
        .location-marker { position: absolute; width: 20px; height: 20px; background-color: red; border: 3px solid white; border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 10px rgba(0,0,0,0.5); display: none; }
        .controls { margin-top: 20px; text-align: center; }
        #track-btn { padding: 10px 20px; font-size: 16px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #track-btn.active { background-color: #dc3545; }
        #status { margin-top: 10px; font-size: 14px; color: #666; }
    </style>
</head>
<body>

<div class="map-container">
    <img src="map.png" class="map-image" alt="지도">
    
    <div id="user-location" class="location-marker"></div>
</div>

<div class="controls">
    <button id="track-btn">위치 추적 시작</button>
    <div id="status"></div>
</div>

<script>
    // 1. 사용자가 제공한 4개 모서리 데이터 정의
    const cornerNW = { imgX: 3.21, imgY: 3.53, lat: 36.370968, lng: 127.382809 }; // 북서
    const cornerNE = { imgX: 95.07, imgY: 9.17, lat: 36.370567, lng: 127.393300 }; // 북동
    const cornerSE = { imgX: 96.02, imgY: 94.99, lat: 36.365056, lng: 127.393357 }; // 남동
    const cornerSW = { imgX: 3.70, imgY: 94.62, lat: 36.365051, lng: 127.382840 }; // 남서

    // 2. 보간법을 위한 범위 계산 (단순 선형 보간 사용)
    const latNorthAvg = (cornerNW.lat + cornerNE.lat) / 2;
    const latSouthAvg = (cornerSW.lat + cornerSE.lat) / 2;
    const latRange = latNorthAvg - latSouthAvg;

    const lngWestAvg = (cornerNW.lng + cornerSW.lng) / 2;
    const lngEastAvg = (cornerNE.lng + cornerSE.lng) / 2;
    const lngRange = lngEastAvg - lngWestAvg;

    const imgXWestAvg = (cornerNW.imgX + cornerSW.imgX) / 2;
    const imgXEastAvg = (cornerNE.imgX + cornerSE.imgX) / 2;
    const imgXRange = imgXEastAvg - imgXWestAvg;

    const imgYNorthAvg = (cornerNW.imgY + cornerNE.imgY) / 2;
    const imgYSouthAvg = (cornerSW.imgY + cornerSE.imgY) / 2;
    const imgYRange = imgYSouthAvg - imgYNorthAvg;

    // 3. GPS 좌표를 이미지 비율 좌표로 변환하는 함수
    function calculatePosition(lat, lng) {
        // 이미지 범위 밖인지 확인 (기본적인 경계 체크)
        if (lat > latNorthAvg + 0.001 || lat < latSouthAvg - 0.001 || lng < lngWestAvg - 0.001 || lng > lngEastAvg + 0.001) {
            return null; // 지도 범위를 벗어남
        }

        const latNorm = (latNorthAvg - lat) / latRange;
        const lngNorm = (lng - lngWestAvg) / lngRange;

        const imgXPercent = imgXWestAvg + lngNorm * imgXRange;
        const imgYPercent = imgYNorthAvg + latNorm * imgYRange;

        return { x: imgXPercent, y: imgYPercent };
    }

    // 4. Geolocation 및 UI 제어
    const trackBtn = document.getElementById('track-btn');
    const userLocationMarker = document.getElementById('user-location');
    const statusDiv = document.getElementById('status');
    let watchId = null;

    function showPosition(position) {
        const lat = position.coords.latitude;
        const lng = position.coords.longitude;
        const accuracy = position.coords.accuracy;

        const mapPos = calculatePosition(lat, lng);

        if (mapPos) {
            userLocationMarker.style.left = mapPos.x + '%';
            userLocationMarker.style.top = mapPos.y + '%';
            userLocationMarker.style.display = 'block';
            statusDiv.innerHTML = `위치: 위도 ${lat.toFixed(6)}, 경도 ${lng.toFixed(6)} (정확도: ${accuracy.toFixed(1)}m)`;
        } else {
            userLocationMarker.style.display = 'none';
            statusDiv.innerHTML = `위치: 위도 ${lat.toFixed(6)}, 경도 ${lng.toFixed(6)} (지도 범위 밖)`;
        }
    }

    function showError(error) {
        switch(error.code) {
            case error.PERMISSION_DENIED:
                statusDiv.innerHTML = "사용자가 위치 정보 접근을 거부했습니다."
                break;
            case error.POSITION_UNAVAILABLE:
                statusDiv.innerHTML = "위치 정보를 사용할 수 없습니다."
                break;
            case error.TIMEOUT:
                statusDiv.innerHTML = "위치 정보를 가져오는 시간이 초과되었습니다."
                break;
            case error.UNKNOWN_ERROR:
                statusDiv.innerHTML = "알 수 없는 오류가 발생했습니다."
                break;
        }
    }

    trackBtn.addEventListener('click', () => {
        if (watchId === null) {
            if (navigator.geolocation) {
                // 실시간 위치 추적 시작
                watchId = navigator.geolocation.watchPosition(showPosition, showError, {
                    enableHighAccuracy: true,
                    maximumAge: 0,
                    timeout: 5000
                });
                trackBtn.textContent = "위치 추적 중지";
                trackBtn.classList.add('active');
                statusDiv.innerHTML = "위치를 찾는 중입니다...";
            } else {
                statusDiv.innerHTML = "이 브라우저는 Geolocation을 지원하지 않습니다.";
            }
        } else {
            // 위치 추적 중지
            navigator.geolocation.clearWatch(watchId);
            watchId = null;
            trackBtn.textContent = "위치 추적 시작";
            trackBtn.classList.remove('active');
            userLocationMarker.style.display = 'none';
            statusDiv.innerHTML = "위치 추적이 중지되었습니다.";
        }
    });
</script>

</body>
</html>
