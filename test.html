<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>맵 좌표 확인 테스트 (마우스 추적형)</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 20px;
            background-color: #222;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }
        #map-wrapper {
            position: relative;
            display: inline-block;
            border: 2px solid #555;
            cursor: crosshair;
            /* 이미지 로딩 실패 시에도 최소 영역 확보를 위한 임시 크기 */
            min-width: 300px;
            min-height: 200px; 
        }
        #map-img {
            display: block;
            max-width: 100%;
            height: auto;
            -webkit-user-drag: none;
        }
        
        #tooltip {
            position: fixed;
            pointer-events: none;
            background-color: rgba(0, 0, 0, 0.85);
            color: #00ff00;
            padding: 8px 12px;
            border: 1px solid #444;
            border-radius: 6px;
            font-size: 15px;
            font-family: monospace;
            font-weight: bold;
            display: none; /* 기본 숨김 */
            z-index: 1000;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <h2>지도 좌표 추출기 (마우스 추적형)</h2>
    <p>이미지 위에 마우스를 올리면 실시간으로 정밀 좌표(소수점 4자리)가 표시됩니다.</p>

    <div id="map-wrapper">
        <img src="map.jpg" id="map-img" alt="테스트 이미지">
    </div>

    <div id="tooltip"></div>

    <script>
        const img = document.getElementById('map-img');
        const tooltip = document.getElementById('tooltip');

        // 이미지가 정상적으로 로드된 후부터 마우스 이벤트를 추적
        img.addEventListener('mousemove', function(e) {
            // 툴팁 보이기
            tooltip.style.display = 'block';

            // 이미지 크기와 위치 가져오기
            const rect = img.getBoundingClientRect();
            
            // 이미지 내부 픽셀 좌표
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            // % 좌표 계산 (소수점 4자리)
            const xPercent = (x / rect.width) * 100;
            const yPercent = (y / rect.height) * 100;

            // 툴팁 내용 업데이트
            tooltip.innerText = `X: ${xPercent.toFixed(4)}% | Y: ${yPercent.toFixed(4)}%`;

            // 툴팁 위치 조정
            const offset = 15;
            let tooltipX = e.clientX + offset;
            let tooltipY = e.clientY + offset;

            // 브라우저 화면 이탈 방지 (Boundary Check)
            const tooltipWidth = tooltip.offsetWidth;
            const tooltipHeight = tooltip.offsetHeight;

            if (tooltipX + tooltipWidth > window.innerWidth) {
                tooltipX = e.clientX - tooltipWidth - offset;
            }
            if (tooltipY + tooltipHeight > window.innerHeight) {
                tooltipY = e.clientY - tooltipHeight - offset;
            }

            tooltip.style.left = tooltipX + 'px';
            tooltip.style.top = tooltipY + 'px';
        });

        // 마우스가 이미지 밖으로 나가면 툴팁 숨김
        img.addEventListener('mouseleave', function() {
            tooltip.style.display = 'none';
        });
    </script>

</body>
</html>
