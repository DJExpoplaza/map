<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>맵 좌표 확인 테스트 (마우스 추적형)</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 20px;
            background-color: #222;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden; /* 가로 스크롤 방지 */
        }
        #map-wrapper {
            position: relative;
            display: inline-block;
            border: 2px solid #555;
            cursor: crosshair;
        }
        #map-img {
            display: block;
            max-width: 100%;
            height: auto;
            -webkit-user-drag: none; /* 이미지 드래그 방지 */
        }
        
        /* 마우스를 따라다닐 툴팁 스타일 */
        #tooltip {
            position: fixed; /* 브라우저 화면 기준으로 움직임 */
            pointer-events: none; /* 마우스 클릭을 방해하지 않음 */
            background-color: rgba(0, 0, 0, 0.85);
            color: #00ff00;
            padding: 8px 12px;
            border: 1px solid #444;
            border-radius: 6px;
            font-size: 15px;
            font-family: monospace;
            font-weight: bold;
            display: none; /* 초기에는 숨김 */
            z-index: 1000;
            white-space: nowrap; /* 글자가 줄바꿈되지 않도록 설정 */
        }
    </style>
</head>
