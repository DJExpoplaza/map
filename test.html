<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>맵 좌표 확인 테스트</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 20px;
            background-color: #222;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #map-wrapper {
            position: relative;
            display: inline-block;
            border: 2px solid #555;
            cursor: crosshair;
        }
        #map-img {
            display: block;
            max-width: 100%;
            height: auto;
            -webkit-user-drag: none; /* 이미지 드래그 방지 */
        }
        #result-panel {
            margin-top: 20px;
            padding: 15px;
            background-color: #333;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            color: #00ff00;
            min-width: 300px;
            text-align: center;
        }
    </style>
</head>
<body>

    <h2>지도 좌표 추출기 (퍼센트)</h2>
    <p>이미지를 클릭하면 해당 지점의 X, Y 좌표(%)가 표시됩니다.</p>

    <div id="map-wrapper">
        <img src="map.jpg" id="map-img" alt="테스트 이미지">
    </div>

    <div id="result-panel">
        클릭 대기 중...
    </div>

    <script>
        const wrapper = document.getElementById('map-wrapper');
        const img = document.getElementById('map-img');
        const resultPanel = document.getElementById('result-panel');

        wrapper.addEventListener('click', function(e) {
            // 이미지의 화면상 크기와 위치 정보 가져오기
            const rect = img.getBoundingClientRect();
            
            // 클릭한 위치의 이미지 내 픽셀 좌표 계산
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            // 전체 너비/높이 대비 퍼센트로 변환
            const xPercent = (x / rect.width) * 100;
            const yPercent = (y / rect.height) * 100;

            // 소수점 2자리까지 잘라서 화면에 출력
            resultPanel.innerText = `X: ${xPercent.toFixed(2)}%  /  Y: ${yPercent.toFixed(2)}%`;
        });
    </script>

</body>
</html>
